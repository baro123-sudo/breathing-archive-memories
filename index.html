<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin: 0; background: black; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let memories;
let blobs = [];
let particles = [];
let chaos = 0;
let imgs = [];

function preload() {
  imgs[0] = loadImage('1000051861.jpg');
  imgs[1] = loadImage('1000053232.jpg');
  imgs[2] = loadImage('1000073040.jpg');
  imgs[3] = loadImage('1000073407.jpg');
  imgs[4] = loadImage('1000073841.jpg');
  imgs[5] = loadImage('1000074023.jpg');
  imgs[6] = loadImage('1000075030.jpg');
  imgs[7] = loadImage('20250503_173435.jpg');
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  memories = [
    { text: "sunset",          hue: 200, size: 140, img: 0 },
    { text: "perfect weekend",   hue: 280, size: 120, img: 1 },
    { text: "after rain",     hue: 160, size: 130, img: 2 },
    { text: "furry friend",             hue: 220, size: 110, img: 3 },
    { text: "fix boredom",       hue: 240, size: 150, img: 4 },
    { text: "night",             hue: 260, size: 125, img: 5 },
    { text: "afterrain",         hue: 180, size: 100, img: 6 },
    { text: "city walk",  hue: 300, size: 135, img: 7 },
  ];

  for (let i = 0; i < memories.length; i++) {
    let b = new Blob(memories[i]);
    b.init();
    blobs.push(b);
  }
}

function draw() {
  background(240, 30, 10);
  chaos = lerp(chaos, 0, 0.02);

  for (let b of blobs) {
    b.update();
    b.show();
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 8;
    fill(0, 0, 100, p.life * 0.4);
    noStroke();
    ellipse(p.x, p.y, 3);
    if (p.life <= 0) particles.splice(i, 1);
  }

  fill(0, 0, 100, 20);
  noStroke();
  textSize(11);
  textAlign(CENTER);
  text("click to disturb — hover to push", width / 2, height - 15);
}

function mousePressed() {
  chaos = 1;
  for (let b of blobs) b.scatter();
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: mouseX, y: mouseY,
      vx: random(-5, 5),
      vy: random(-5, 5),
      life: 255
    });
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  for (let b of blobs) {
    b.homeX = random(100, width - 100);
    b.homeY = random(100, height - 100);
  }
}

class Blob {
  constructor(memory) {
    this.memory      = memory;
    this.img         = imgs[memory.img];
    this.homeX       = 0;
    this.homeY       = 0;
    this.x           = 0;
    this.y           = 0;
    this.vx          = 0;
    this.vy          = 0;
    this.breatheOffset = 0;
    this.breatheSpeed  = 0;
    this.noiseOffset   = 0;
    this.hue           = memory.hue;
    this.baseSize      = memory.size;
    this.opacity       = 0;
    this.currentSize   = memory.size;
  }

  init() {
    this.homeX         = random(100, width - 100);
    this.homeY         = random(100, height - 100);
    this.x             = this.homeX;
    this.y             = this.homeY;
    this.breatheOffset = random(TWO_PI);
    this.breatheSpeed  = random(0.008, 0.02);
    this.noiseOffset   = random(1000);
    this.opacity       = random(70, 95);
  }

  update() {
    let breathe      = sin(frameCount * this.breatheSpeed + this.breatheOffset);
    this.currentSize = this.baseSize + breathe * 12;

    let driftX = (this.homeX - this.x) * 0.02;
    let driftY = (this.homeY - this.y) * 0.02;
    this.vx += driftX;
    this.vy += driftY;
    this.vx *= 0.9;
    this.vy *= 0.9;
    this.x  += this.vx;
    this.y  += this.vy;

    let d = dist(mouseX, mouseY, this.x, this.y);
    if (d < this.currentSize * 1.5) {
      let angle = atan2(this.y - mouseY, this.x - mouseX);
      let force = map(d, 0, this.currentSize * 1.5, 3, 0);
      this.vx += cos(angle) * force;
      this.vy += sin(angle) * force;
    }

    this.noiseOffset += 0.005;
  }

  scatter() {
    let angle = atan2(this.y - mouseY, this.x - mouseX);
    let force = random(8, 20);
    this.vx  += cos(angle) * force;
    this.vy  += sin(angle) * force;
  }

  _buildPath(r) {
    drawingContext.beginPath();
    let first = true;
    for (let a = 0; a < TWO_PI; a += 0.25) {
      let n      = noise(cos(a) * 0.5 + this.noiseOffset, sin(a) * 0.5 + this.noiseOffset);
      let offset = map(n, 0, 1, -r * 0.5, r * 0.5);
      let rx = (r + offset) * cos(a);
      let ry = (r + offset) * sin(a);
      if (first) { drawingContext.moveTo(rx, ry); first = false; }
      else        drawingContext.lineTo(rx, ry);
    }
    drawingContext.closePath();
  }

  show() {
    push();
    translate(this.x, this.y);
    let r = this.currentSize;

    drawingContext.shadowBlur  = 30;
    drawingContext.shadowColor = `hsla(${this.hue}, 80%, 70%, 0.4)`;

    if (this.img) {
      drawingContext.save();
      this._buildPath(r);
      drawingContext.clip();
      drawingContext.globalAlpha = this.opacity / 100;
      image(this.img, -r, -r, r * 2, r * 2);
      drawingContext.globalAlpha = 1;
      drawingContext.restore();
    }

    drawingContext.shadowBlur = 0;
    noStroke();
    fill(this.hue, 60, 80, this.opacity * 0.35);
    beginShape();
    for (let a = 0; a < TWO_PI; a += 0.25) {
      let n      = noise(cos(a) * 0.5 + this.noiseOffset, sin(a) * 0.5 + this.noiseOffset);
      let offset = map(n, 0, 1, -r * 0.5, r * 0.5);
      curveVertex((r + offset) * cos(a), (r + offset) * sin(a));
    }
    endShape(CLOSE);

    fill(0, 0, 100, this.opacity * 0.95);
    noStroke();
    textSize(map(this.baseSize, 55, 90, 10, 14));
    textAlign(CENTER, CENTER);
    textStyle(ITALIC);
    text(this.memory.text, 0, 0);

    pop();
  }
}
</script>
</body>
</html>
